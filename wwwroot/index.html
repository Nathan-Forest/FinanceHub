<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 FinanceHub Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1>💰 FinanceHub Dashboard</h1>
        <p class="subtitle">Your personal finance command center</p>
    </header>

    <!-- Summary Cards -->
    <section class="summary-section">
        <div class="container">
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Income</h3>
                    <p class="amount income" id="total-income">$0.00</p>
                </div>
                <div class="card">
                    <h3>Total Expenses</h3>
                    <p class="amount expense" id="total-expenses">$0.00</p>
                </div>
                <div class="card">
                    <h3>Net Balance</h3>
                    <p class="amount balance" id="net-balance">$0.00</p>
                </div>
                <div class="card">
                    <h3>Transactions</h3>
                    <p class="count" id="transaction-count">0</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <div class="dashboard-grid">

            <!-- Left Column: Add Transaction -->
            <div class="panel">
                <h2>➕ Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="expense">💸 Expense</option>
                            <option value="income">💰 Income</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <!-- Populated from API -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <button type="submit" class="btn-primary">Add Transaction</button>
                </form>
            </div>

            <!-- Right Column: Category Breakdown -->
            <div class="panel">
                <h2>📊 Spending by Category</h2>
                <div id="category-breakdown" class="category-bars">
                    <p class="empty-state">Loading categories...</p>
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="panel">
            <h2>📋 Recent Transactions</h2>
            <div id="transactions-list" class="transactions-grid">
                <p class="empty-state">Loading transactions...</p>
            </div>
        </div>

        <!-- CHARTS SECTION - NEW! -->
        <div class="charts-grid">
            <div class="panel">
                <h2>📊 Spending Breakdown</h2>
                <canvas id="pieChart"></canvas>
            </div>

            <div class="panel">
                <h2>📈 Monthly Trends</h2>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </main>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Your App -->
    <script src="js/app.js"></script>
</body>

</html>
